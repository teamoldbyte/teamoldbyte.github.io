name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 최적화: 직전 커밋과의 비교를 위한 최소한의 히스토리만 조회 (속도 향상)

      - name: Get Target Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # **를 사용하여 모든 하위 디렉토리 내의 파일을 포함합니다.
          files: |
            fragment/**/*.html
            js/**/*.js
            css/**/*.css

      - name: Minify Target Files Only
        # 변경된 대상 파일이 존재할 때만 실행하여 불필요한 프로세스 방지
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            # 파일이 실제로 존재하고 + 중간에 .min. 키워드가 없는 경우에만 진행
            if [ -f "$file" ] && [[ "$file" != *".min."* ]]; then
            
              # 수정 포인트: 쉘 스크립트 분기문도 하위 디렉토리를 인식하도록 패턴 매칭 수정
              if [[ "$file" == fragment/*.html || "$file" == fragment/**/*.html ]]; then
                echo "⚡ HTML 압축 중: $file"
                npx html-minifier --collapse-whitespace --remove-comments --minify-js true --minify-css true -o "$file" "$file"
              
              elif [[ "$file" == js/*.js || "$file" == js/**/*.js ]]; then
                echo "⚡ JS 압축 중: $file"
                npx uglify-js "$file" -c -m -o "$file"
              
              elif [[ "$file" == css/*.css || "$file" == css/**/*.css ]]; then
                echo "⚡ CSS 압축 중: $file"
                npx clean-css-cli -o "$file" "$file"
              fi

            fi
          done

      - name: Auto committing minified files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Github Action: Auto Minified Changed Resources"
          branch: ${{ github.head_ref || github.ref_name }}
      # 깃허브 페이지 시스템 인지
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 루트('.')의 정적 파일들을 배포용 파일로 패키징
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 최종 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
